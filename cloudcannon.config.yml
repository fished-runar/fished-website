# CloudCannon configuration for the Fished marketing site (Eleventy + Tailwind).
# Docs: https://cloudcannon.com/documentation/ — verify field/input syntax against
# your current CloudCannon plan once the repo is connected; the schema below follows
# CloudCannon's documented `data_config` + `_inputs` conventions for editing single
# JSON files that hold an array of repeatable items (add / remove / reorder support).

source: .
output: _site

paths:
  uploads: assets/uploads
  static: assets

# Build settings (mirrors package.json's "build" script).
build:
  script: npm run build

# ------------------------------------------------------------------
# Global design tokens — edited once, cascades everywhere via Tailwind's
# @theme block in styles/main.css. NOTE: these are currently hand-set in
# styles/main.css; wiring this file back into the build (so edits here
# regenerate the @theme block) is a follow-up build step, not yet automated.
# ------------------------------------------------------------------
data_config:
  theme:
    path: _data/theme.json
    _inputs:
      blue: { type: color }
      blueDark: { type: color }
      blueLight: { type: color }
      navy: { type: color }
      text: { type: color }
      textMuted: { type: color }

  # ------------------------------------------------------------------
  # Repeatable content collections — each is a single JSON array file.
  # CloudCannon's array/data-file editing gives add / remove / reorder
  # out of the box; `_inputs` below defines the per-item field editors.
  # ------------------------------------------------------------------
  testimonials:
    path: _data/testimonials.json
    _inputs:
      logo: { type: image }
      logoAlt: { type: text }
      photo: { type: image }
      photoAlt: { type: text }
      excerpt: { type: textarea }
      quote: { type: textarea }
      featured: { type: switch }
      authors:
        type: array
        subtype: object
        _inputs:
          name: { type: text }
          role: { type: text }

  team:
    path: _data/team.json
    _inputs:
      name: { type: text }
      role: { type: text }
      photo: { type: image }
      phone: { type: text }
      email: { type: text }
      linkedin: { type: url }

  timeline:
    path: _data/timeline.json
    _inputs:
      year: { type: text }
      title: { type: text }
      photo: { type: image }
      text: { type: textarea }

  featurePanels:
    path: _data/featurePanels.json
    _inputs:
      tab: { type: text }
      img: { type: image }
      title: { type: text, comment: "HTML <br> allowed for line breaks" }
      desc: { type: textarea }
      list: { type: array, subtype: text }

  offices:
    path: _data/offices.json
    _inputs:
      city: { type: text }
      lat: { type: number }
      lng: { type: number }
      url: { type: url }

  whyCards:
    path: _data/whyCards.json
    _inputs:
      img: { type: image }
      imgAlt: { type: text }
      title: { type: text }
      text: { type: textarea }

  customerLogos:
    path: _data/customerLogos.json
    _inputs:
      src: { type: image }
      alt: { type: text }
      marqueeRow:
        type: select
        options: [1, 2, null]
        comment: "1 or 2 = shown in the homepage marquee row; leave blank for grid-only logos"

  integrationLogos:
    path: _data/integrationLogos.json
    _inputs:
      src: { type: image }
      alt: { type: text }

  nav:
    path: _data/nav.json
    _inputs:
      key: { type: text }
      label: { type: text }
      href: { type: text }

  site:
    path: _data/site.json
    _inputs:
      name: { type: text }
      tagline: { type: text }
      copyright: { type: text }
      logoIcon: { type: image }
      logoText: { type: image }
