<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 48" width="100%" height="100%">
  <!-- Microsoft Dynamics 365 Business Central Custom Lockup -->
  
  <!-- 1. OFFICIAL ICON GEOMETRY -->
  <g transform="translate(0, 4)">
    <!-- Outer Dark Teal Ring Segment -->
    <path d="M20,0 C31.05,0 40,8.95 40,20 C40,29.35 33.6,37.22 25,39.48 L25,34.22 C30.79,32.12 35,26.56 35,20 C35,11.72 28.28,5 20,5 C11.72,5 5,11.72 5,20 C5,26.56 9.21,32.12 15,34.22 L15,39.48 C6.4,37.22 0,29.35 0,20 C0,8.95 8.95,0 20,0 Z" fill="#007897" />
    <!-- Inner Main Teal Circle -->
    <circle cx="20" cy="20" r="12" fill="#00a3c4" />
    <!-- Center Core Dot -->
    <circle cx="20" cy="20" r="5" fill="#7bf2ff" />
    <!-- Horizontal Connecting Network Node -->
    <path d="M20,18 L36,18 C37.1,18 38,18.9 38,20 C38,21.1 37.1,22 36,22 L20,22 Z" fill="#7bf2ff" />
    <!-- Outer Node Dots -->
    <circle cx="20" cy="4" r="3" fill="#7bf2ff" />
    <circle cx="20" cy="36" r="3" fill="#7bf2ff" />
    <circle cx="36" cy="20" r="3" fill="#7bf2ff" />
    <circle cx="4" cy="20" r="3" fill="#7bf2ff" />
  </g>

  <!-- 2. BRAND TYPOGRAPHY (Segoe UI Spec) -->
  <g transform="translate(56, 0)">
    <!-- Top Row: "Microsoft Dynamics 365" (Regular, Dark Gray) -->
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14px" fill="#4a4a4a" letter-spacing="0.3px">Microsoft Dynamics 365</text>
    
    <!-- Bottom Row: "Business Central" (Bold/Semibold, Dark Branding Teal) -->
    <text x="0" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16px" font-weight="700" fill="#004e63" letter-spacing="0.2px">Business Central</text>
  </g>
</svg>
